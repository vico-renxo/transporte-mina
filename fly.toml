# fly.toml — TransporteMina Backend
# Región gru = São Paulo (más cercana a Perú)
app = "transporte-backend"
primary_region = "gru"

[build]

[env]
  PORT = "3001"
  NODE_ENV = "production"

# Ejecutar migraciones ANTES de arrancar la nueva versión
[deploy]
  release_command = "npx prisma migrate deploy"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
