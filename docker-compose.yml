version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: transporte_minero_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transporte_minero
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: transporte_minero_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
